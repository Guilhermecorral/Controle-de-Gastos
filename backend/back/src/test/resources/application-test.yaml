# Config test ? perfil "test"
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        hbm2ddl:
          import_files: ""
    open-in-view: false
  config:
    import: ""

jwt:
  secret: test-secret-key-apenas-para-testes-32-chars-minimo
  expiration: 900000
  refresh-expiration: 604800000

app:
  security:
    field-encryption:
      secret-key: test-field-encryption-secret-key
    two-factor:
      issuer: Farol Financeiro Teste
