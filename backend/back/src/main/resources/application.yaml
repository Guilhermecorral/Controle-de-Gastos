spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  config:
    import: optional:file:.env[.properties],optional:file:.env.properties[.properties],optional:file:backend/back/.env[.properties],optional:file:backend/back/.env.properties[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    redis:
      repositories:
        enabled: false
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:true}
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

app:
  transaction-receipts:
    storage-dir: ${APP_TRANSACTION_RECEIPTS_STORAGE_DIR:storage/transaction-receipts}
    max-bytes: ${APP_TRANSACTION_RECEIPTS_MAX_BYTES:10485760}
  admin:
    bootstrap:
      enabled: ${APP_ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${APP_ADMIN_BOOTSTRAP_EMAIL:}
      password: ${APP_ADMIN_BOOTSTRAP_PASSWORD:}
    allowed-emails: ${APP_ADMIN_ALLOWED_EMAILS:}
  security:
    field-encryption:
      secret-key: ${APP_FIELD_ENCRYPTION_SECRET_KEY}
    two-factor:
      issuer: ${APP_TWO_FACTOR_ISSUER:Farol Financeiro}
    cookies:
      access-token-name: ${APP_ACCESS_COOKIE_NAME}
      refresh-token-name: ${APP_REFRESH_COOKIE_NAME}
      secure: ${APP_COOKIES_SECURE}
      same-site: ${APP_COOKIES_SAME_SITE}
      domain: ${APP_COOKIES_DOMAIN}
    cors:
      allowed-origins: ${APP_ALLOWED_ORIGINS}
    auth-rate-limit:
      window-seconds: ${APP_AUTH_RATE_LIMIT_WINDOW_SECONDS}
      max-attempts: ${APP_AUTH_RATE_LIMIT_MAX_ATTEMPTS}
      redis-enabled: ${APP_AUTH_RATE_LIMIT_REDIS_ENABLED}
    captcha:
      enabled: ${APP_CAPTCHA_ENABLED}
      secret-key: ${APP_CAPTCHA_SECRET_KEY}
      verify-url: ${APP_CAPTCHA_VERIFY_URL}
    password-reset:
      frontend-url: ${APP_PASSWORD_RESET_FRONTEND_URL}
      token-expiration-minutes: ${APP_PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES}
      mail-from: ${APP_PASSWORD_RESET_MAIL_FROM}

logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.web.FilterChainProxy: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: 8080
  forward-headers-strategy: framework
  shutdown: graceful
