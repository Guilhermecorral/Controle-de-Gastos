spring:
  devtools:
    restart:
      enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    # The in-memory database keeps local development simple and fast.
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    defer-datasource-initialization: true
    hibernate:
      # create-drop avoids leftover constraints between repeated local boots.
      ddl-auto: create-drop
    properties:
      hibernate:
        hbm2ddl:
          import_files: ""
    show-sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

app:
  security:
    field-encryption:
      secret-key: ${APP_FIELD_ENCRYPTION_SECRET_KEY:dev-field-encryption-secret-key}
    two-factor:
      issuer: ${APP_TWO_FACTOR_ISSUER:Farol Financeiro}
